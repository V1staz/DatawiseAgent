llm:
  llm_type: openai-chat
  # Change this to the exact model id exposed by your provider.
  # Common examples:
  # model: qwen2.5-14b-instruct
  # model: qwen2.5-32b-instruct
  model: qwen2.5-72b-instruct
  temperature: 0
  top_p: 1
  frequency_penalty: 0.0

code_executor:
  # Keep the shared fork on the local no-Docker path for macOS reproduction.
  use_docker: False
  use_proxy: False
  use_gpu: False

